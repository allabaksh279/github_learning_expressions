---
on:
    push:
        branches:
            - main

env:
  GLOBAL_ENV_VAR: learning thoughts
  ORG_NAME: xyz limited            


jobs:
  context-job:
        runs-on: ubuntu-latest
        env:
          JOBS_ENV_VAR: learning thoughts job
          ORG_NAME: abc limited
        steps:
          - name: steps example
            env:
              STEP_VAR: learning thoughts step

            run: echo '${{ env.GLOBAL_ENV_VAR }} ${{ env.JOBS_ENV_VAR }} ${{ env. STEP_VAR }}'
          - name: same environment
            env:
              ORG_NAME: 123 limited
            run: echo '${{ env.ORG_NAME }}'    
  var-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: print vars
        run: echo 'group = ${{ vars.GLOBAL_NAME }} user = ${{ vars.USERNAME }} token = ${{ secrets.TOKEN }}'

                               